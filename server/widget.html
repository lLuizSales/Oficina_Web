<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<title>VLibras</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html,
			body {
				width: 100vw;
				height: 100vh;
				overflow: hidden;
				background: #ebebeb;
			}

			[vw] {
				position: fixed !important;
				top: 0 !important;
				left: 0 !important;
				right: 0 !important;
				bottom: 0 !important;
				transform: none !important;
				width: 100vw !important;
				height: 100vh !important;
			}

			[vw-access-button] {
				display: none !important;
			}

			[vw] [vw-plugin-wrapper] {
				position: fixed !important;
				top: 0 !important;
				left: 0 !important;
				width: 100vw !important;
				height: 100vh !important;
				float: none !important;
				border-radius: 0 !important;
			}
			[vp] .vpw-box , [vp] .vpw-controls{
				border-radius: 0 !important;
			}

			#vlibras-target {
				position: fixed;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				color: transparent;
				pointer-events: all;
				user-select: text;
				font-size: 18px;
			}
		</style>
	</head>
	<body>
		<span id="vlibras-target"> </span>

		<div vw class="enabled">
			<div vw-access-button class="active"></div>
			<div vw-plugin-wrapper>
				<div class="vw-plugin-top-wrapper"></div>
			</div>
		</div>

		<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
		<script>
			new window.VLibras.Widget("https://vlibras.gov.br/app");

			// Auto-clica o botão para abrir o widget automaticamente
			function tryClick() {
				const btn = document.querySelector("[vw-access-button]");
				if (btn) {
					btn.click();
				} else {
					setTimeout(tryClick, 200);
				}
			}
			setTimeout(tryClick, 500);
		</script>

		<script>
			const ws = new WebSocket("ws://localhost:8766");

			ws.onopen = () => console.log("Widget conectado ao servidor Python");
			ws.onerror = (e) => console.error("Erro WebSocket widget:", e);
			ws.onclose = () => console.log("Widget desconectado do servidor");

			// Fila de textos a traduzir
			const queue = [];
			let isPlaying = false;

			function isAnimating() {
				const controls = document.querySelector("[vp-controls]");
				if (!controls) return false;
				return !controls.classList.contains("vpw-stopped");
			}

			function processQueue() {
				if (queue.length === 0 || isAnimating()) return;

				const text = queue.shift();
				console.log("Traduzindo:", text);

				const el = document.getElementById("vlibras-target");
				el.textContent = text;

				const range = document.createRange();
				range.selectNodeContents(el);
				const sel = window.getSelection();
				sel.removeAllRanges();
				sel.addRange(range);
				el.dispatchEvent(
					new MouseEvent("click", { bubbles: true, cancelable: true }),
				);
			}

			const observer = new MutationObserver(() => {
				if (!isAnimating() && queue.length > 0) {
					setTimeout(processQueue, 300); 
				}
			});

			function startObserver() {
				const controls = document.querySelector("[vp-controls]");
				if (controls) {
					observer.observe(controls, {
						attributes: true,
						attributeFilter: ["class"],
					});
					console.log("Observer iniciado");
				} else {
					setTimeout(startObserver, 500);
				}
			}
			setTimeout(startObserver, 2000);

			ws.onmessage = (event) => {
				const data = JSON.parse(event.data);
				if (!data.text) return;

				console.log("Texto recebido:", data.text);
				queue.push(data.text);
				processQueue();
			};
		</script>
	</body>
</html>
